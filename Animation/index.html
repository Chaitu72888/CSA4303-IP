<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Animations Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Animations Playground</h1>
<p class="subtitle">Each box below uses a different <code>@keyframes</code> animation running on page load.</p>

<div class="grid">

  <div class="box">
    <div class="shape bounce"></div>
    <p>bounce</p>
  </div>

  <div class="box">
    <div class="shape spin"></div>
    <p>spin</p>
  </div>

  <div class="box">
    <div class="shape pulse"></div>
    <p>pulse</p>
  </div>

  <div class="box">
    <div class="shape slide"></div>
    <p>slide</p>
  </div>

  <div class="box">
    <div class="shape fade"></div>
    <p>fade</p>
  </div>

  <div class="box">
    <div class="shape shake"></div>
    <p>shake</p>
  </div>

</div>

<div class="loader-section">
  <h2>Loading Spinner Example</h2>
  <div class="spinner"></div>
</div>

</body>
</html>
